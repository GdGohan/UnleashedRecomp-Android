<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
        
    <title>SEGA | ソニック ワールドアドベンチャー</title>

    <link rel="shortcut icon" href="favicon.ico">
	<link rel="icon" href="icon.png" type="image/png">

    <script src="contents/scripts/swfobject/swfobject.js"></script>
    <script src="contents/scripts/swfaddress/swfaddress.js"></script>
    <script src="contents/scripts/swfforcesize/swfforcesize.js"></script>
    <script src="contents/scripts/progression.js"></script>
	
	<script>
		window.RufflePlayer = window.RufflePlayer || {};
		window.RufflePlayer.config = {
			renderer: "webgl",
			letterbox: "on",
            scale: "showAll",
			quality: "best"
		};
	</script>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050a0f;
        }

        #flashcontent {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
		
		#viewport {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 900px;
            height: 612px;
            transform-origin: center center;
        }

        ruffle-player {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

    <div id="flashcontent">
        <div id="viewport"></div>
    </div>

    <script>
        var bgcolor = "#050a0f";
        
        const sw = 900;
        const sh = 612;
        
        function resize() {
            const scale = Math.min(
                window.innerWidth / sw,
                window.innerHeight / sh
            );
        
            const vp = document.getElementById("viewport");
        
            vp.style.transform =
                `translate(-50%, -50%) scale(${scale})`;
        }
        
        window.addEventListener("resize", resize);
        resize();

        var so = new SWFObject(
            "preloader.swf",
            "external_flashcontent",
            sw,
            sh,
            "9",
            bgcolor
        );

        so.addParam("allowFullScreen", "true");
        so.addParam("allowScriptAccess", "always");

        so.addParam("wmode", "window");
        so.addParam("quality", "best");
        so.addParam("scale", "showAll");

        so.write("viewport");
    </script>

</body>

</html>
