# Builds a non-debuggable Android release APK. Publishing additionally requires
# the fork's long-lived signing key so in-app updates retain the same identity.
#
# Required private game inputs:
#   - repository variable GAME_FILES_REPO
#   - repository secret GAME_FILES_TOKEN
#
# Required for publishing:
#   - ANDROID_KEYSTORE_BASE64
#   - ANDROID_KEYSTORE_PASSWORD
#   - ANDROID_KEY_ALIAS
#   - ANDROID_KEY_PASSWORD
name: Android APK

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Additional release notes"
        required: false
        default: ""
      release_type:
        description: "Publish mode"
        type: choice
        required: true
        default: none
        options:
          - none
          - release
          - prerelease
  push:
    tags: ["v*"]
  pull_request:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NDK_VERSION: "29.0.14206865"
  BUILD_TOOLS_VERSION: "34.0.0"
  VCPKG_COMMIT: b322364f06308bdd24823f9d8f03fe0cc86fd46f
  # Certificate used by the already-published GdGohan v0.5.2-2 APK. Changing
  # this fingerprint intentionally breaks Android's update chain.
  EXPECTED_SIGNING_CERT_SHA256: dc7bdda9a75e1468722bf34facea630a30d40cfe8b5541de1d26f560fb35f1bb

jobs:
  java-checks:
    name: Android Java checks
    runs-on: ubuntu-24.04
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run unit tests and Lint
        working-directory: android-apk
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:testDebugUnitTest :app:lintDebug

  build:
    name: Build release APK (arm64-v8a)
    if: github.event_name != 'pull_request'
    needs: java-checks
    runs-on: ubuntu-24.04
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      publish: ${{ steps.version.outputs.publish }}
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Read and validate app version
        id: version
        env:
          REQUESTED_RELEASE_TYPE: ${{ github.event.inputs.release_type || 'release' }}
        run: |
          set -euo pipefail
          GRADLE_FILE=android-apk/app/build.gradle
          VERSION_CODE=$(sed -nE 's/^[[:space:]]*versionCode[[:space:]]+([0-9]+).*$/\1/p' "$GRADLE_FILE" | head -n 1)
          VERSION_NAME=$(sed -nE 's/^[[:space:]]*versionName[[:space:]]+"([^"]+)".*$/\1/p' "$GRADLE_FILE" | head -n 1)
          if [ -z "$VERSION_CODE" ] || [ -z "$VERSION_NAME" ]; then
            echo "::error::Could not read versionCode/versionName from $GRADLE_FILE"
            exit 1
          fi

          RELEASE_TAG="v${VERSION_NAME}"
          PUBLISH=false
          if [ "$GITHUB_EVENT_NAME" = "push" ] || [ "$REQUESTED_RELEASE_TYPE" != "none" ]; then
            PUBLISH=true
          fi

          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF_NAME" != "$RELEASE_TAG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match app version $RELEASE_TAG"
            exit 1
          fi

          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "publish=$PUBLISH" >> "$GITHUB_OUTPUT"
          echo "Building $RELEASE_TAG (versionCode $VERSION_CODE, publish=$PUBLISH)"

      - name: Validate private build inputs
        env:
          GAME_FILES_REPO: ${{ vars.GAME_FILES_REPO }}
          GAME_FILES_TOKEN: ${{ secrets.GAME_FILES_TOKEN }}
        run: |
          if [ -z "$GAME_FILES_REPO" ] || [ -z "$GAME_FILES_TOKEN" ]; then
            echo "::error::GAME_FILES_REPO and GAME_FILES_TOKEN are required for the native build"
            exit 1
          fi

      - name: Check out game files
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GAME_FILES_REPO }}
          token: ${{ secrets.GAME_FILES_TOKEN }}
          path: game-files

      - name: Stage game files
        run: |
          install -m 644 game-files/default.xex game-files/default.xexp game-files/shader.ar UnleashedRecompLib/private/
          rm -rf game-files

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache clang

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android NDK and build tools
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;$NDK_VERSION" "build-tools;$BUILD_TOOLS_VERSION" >/dev/null

      - name: Set up vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg thirdparty/vcpkg
          git -C thirdparty/vcpkg checkout "$VCPKG_COMMIT"
          thirdparty/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: android-arm64
          max-size: 3G

      - name: Extract zstd build
        working-directory: tools/XenosRecomp/thirdparty/zstd
        run: unzip -o build.zip

      - name: Build host tools
        env:
          VCPKG_ROOT: ${{ github.workspace }}/thirdparty/vcpkg
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B out/build/host-tools -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUNLEASHED_RECOMP_HOST_TOOLS_ONLY=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build out/build/host-tools --target XenonRecomp XenosRecomp file_to_c x_decompress
          for tool in XenonRecomp XenosRecomp file_to_c x_decompress; do
            path=$(find out/build/host-tools -type f -name "$tool" | head -n 1)
            if [ -z "$path" ]; then
              echo "::error::Host tool $tool was not produced"
              exit 1
            fi
            var=$(echo "$tool" | tr '[:lower:]' '[:upper:]' | tr -d '_')
            echo "HOST_$var=$GITHUB_WORKSPACE/$path" >> "$GITHUB_ENV"
          done

      - name: Configure Android build
        env:
          VCPKG_ROOT: ${{ github.workspace }}/thirdparty/vcpkg
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/$NDK_VERSION"
          export ANDROID_NDK_ROOT="$ANDROID_NDK_HOME"
          cmake -S . -B out/build/android-arm64 -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=thirdparty/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=arm64-android \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_SYSTEM_VERSION=29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DUNLEASHED_RECOMP_ANDROID=ON \
            -DUNLEASHED_RECOMP_D3D12=OFF \
            -DUNLEASHED_RECOMP_HOST_XENON_RECOMP="$HOST_XENONRECOMP" \
            -DUNLEASHED_RECOMP_HOST_XENOS_RECOMP="$HOST_XENOSRECOMP" \
            -DUNLEASHED_RECOMP_HOST_FILE_TO_C="$HOST_FILETOC" \
            -DUNLEASHED_RECOMP_HOST_X_DECOMPRESS="$HOST_XDECOMPRESS" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Fix dxc permissions
        run: chmod +x tools/XenosRecomp/thirdparty/dxc-bin/bin/x64/*

      - name: Build native libraries
        run: |
          cmake --build out/build/android-arm64 \
            --target UnleashedRecomp main_hook file_redirect_hook gsl_alloc_hook hook_impl

      - name: Stage jniLibs
        run: |
          set -euo pipefail
          dest=android-apk/app/src/main/jniLibs/arm64-v8a
          mkdir -p "$dest"
          cp out/build/android-arm64/UnleashedRecomp/libmain.so "$dest/"
          for lib in libmain_hook.so libfile_redirect_hook.so libgsl_alloc_hook.so libhook_impl.so; do
            path=$(find out/build/android-arm64 -name "$lib" | head -n 1)
            if [ -z "$path" ]; then
              echo "::error::adrenotools hook library $lib was not produced"
              exit 1
            fi
            cp "$path" "$dest/"
          done
          ls -la "$dest"

      - name: Build release APK
        working-directory: android-apk
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PUBLISH: ${{ steps.version.outputs.publish }}
        run: |
          set -euo pipefail
          chmod +x gradlew
          if [ "$PUBLISH" = "true" ]; then
            for value in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
              if [ -z "${!value:-}" ]; then
                echo "::error::$value is required for a published release"
                exit 1
              fi
            done
          fi
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
            export ANDROID_KEYSTORE_FILE="$RUNNER_TEMP/keystore.jks"
          fi
          ./gradlew --no-daemon assembleRelease

      - name: Verify and stage APK
        id: apk
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          PUBLISH: ${{ steps.version.outputs.publish }}
        run: |
          set -euo pipefail
          APK=$(find android-apk/app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::Release APK not found"
            exit 1
          fi

          AAPT="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/aapt"
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner"
          BADGING=$($AAPT dump badging "$APK")
          echo "$BADGING" | grep -F "package: name='com.sega.sonicunr'"
          echo "$BADGING" | grep -F "versionCode='$VERSION_CODE'"
          echo "$BADGING" | grep -F "versionName='$VERSION_NAME'"
          if echo "$BADGING" | grep -q '^application-debuggable'; then
            echo "::error::Refusing to publish a debuggable APK"
            exit 1
          fi
          unzip -l "$APK" | grep -F 'lib/arm64-v8a/libmain.so'

          if $APKSIGNER verify --verbose "$APK"; then
            CERT=$($APKSIGNER verify --print-certs "$APK" | \
              awk -F': ' '/Signer #1 certificate SHA-256 digest:/ {print tolower($2); exit}')
            if [ "$CERT" != "$EXPECTED_SIGNING_CERT_SHA256" ]; then
              echo "::error::Signing certificate $CERT does not match the established update key"
              exit 1
            fi
            echo "Verified established signing certificate: $CERT"
          elif [ "$PUBLISH" = "true" ]; then
            echo "::error::Published releases must be signed"
            exit 1
          else
            echo "Unsigned release artifact accepted because publishing is disabled"
          fi

          mkdir -p release-artifacts
          OUTPUT="release-artifacts/UnleashedRecomp_${VERSION_NAME}.apk"
          cp "$APK" "$OUTPUT"
          sha256sum "$OUTPUT"

      - name: Upload verified APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-Android-${{ steps.version.outputs.release_tag }}
          path: release-artifacts/*.apk
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish verified release
    needs: build
    if: needs.build.outputs.publish == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out sources for release notes
        uses: actions/checkout@v4

      - name: Download verified APK
        uses: actions/download-artifact@v4
        with:
          name: UnleashedRecomp-Android-${{ needs.build.outputs.release_tag }}
          path: release-artifacts

      - name: Create release as draft, upload, then publish
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type || 'release' }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          set -euo pipefail
          APK=$(find release-artifacts -maxdepth 1 -type f -name '*.apk' | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::Verified APK artifact not found"
            exit 1
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Release $RELEASE_TAG already exists"
            exit 1
          fi

          NOTES="Verified non-debuggable Android release for ${RELEASE_TAG}."
          if [ "$RELEASE_TAG" = "v0.5.2-3" ]; then
            NOTES="$NOTES

          Migration note: v0.5.2-2 checked the upstream update channel. Install this release manually once; later fork releases will be detected in-app."
          fi
          PARENT_REPO=$(gh api repos/${GITHUB_REPOSITORY} --jq '.parent.full_name // empty')
          if [ -n "$PARENT_REPO" ]; then
            BASE_TAG=$(gh api repos/${PARENT_REPO}/releases/latest --jq '.tag_name // empty' 2>/dev/null || true)
            if [ -n "$BASE_TAG" ]; then
              NOTES="$NOTES

          Based on: https://github.com/${PARENT_REPO}/releases/tag/${BASE_TAG}"
            fi
          fi

          mapfile -t BANNERS < <(find patches/banners -type f \
            \( -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.webp' \) | sort)
          if [ "${#BANNERS[@]}" -gt 0 ]; then
            INDEX=$((16#${GITHUB_SHA:0:8} % ${#BANNERS[@]}))
            BANNER_PATH=${BANNERS[$INDEX]}
            BANNER_NAME=$(basename "$BANNER_PATH")
            NOTES="![${BANNER_NAME}](https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/${BANNER_PATH})

          ${NOTES}"
          fi
          if [ -n "${RELEASE_NOTES:-}" ]; then
            NOTES="$NOTES

          ${RELEASE_NOTES}"
          fi

          ARGS=("$RELEASE_TAG" "$APK" --draft --title "$RELEASE_TAG" --notes "$NOTES")
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            ARGS+=(--verify-tag)
          else
            ARGS+=(--target "$GITHUB_SHA")
          fi
          if [ "$RELEASE_TYPE" = "prerelease" ]; then
            ARGS+=(--prerelease)
          fi

          gh release create "${ARGS[@]}"
          gh release edit "$RELEASE_TAG" --draft=false
