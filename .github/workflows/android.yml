# Builds the Android APK from source on every tag push (v*) or manual dispatch.
#
# Game-derived inputs (default.xex, default.xexp, shader.ar) cannot live in this
# public repository. They are fetched from a private repository configured via:
#   - repository VARIABLE `GAME_FILES_REPO`  - e.g. "SansNope/UnleashedRecomp-GameFiles"
#   - repository SECRET  `GAME_FILES_TOKEN`  - fine-grained PAT with read-only
#     Contents access to that single repository
# The private repository must contain default.xex, default.xexp and shader.ar
# at its root. See docs/ci.md for details.
#
# Optional release signing (falls back to a debug build when unset):
#   - secret `ANDROID_KEYSTORE_BASE64`   - keystore file, base64-encoded
#   - secret `ANDROID_KEYSTORE_PASSWORD`
#   - secret `ANDROID_KEY_ALIAS`
#   - secret `ANDROID_KEY_PASSWORD`
name: Android Build

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Additional release notes"
        required: false
        default: ""
      release_type:
        description: "Publish mode"
        type: choice
        required: true
        default: release
        options:
          - none
          - release
          - prerelease
      use_banner_image:
        description: "Include banner image in release notes"
        type: boolean
        required: true
        default: true
      compile_apk:
        description: "Compile the APK"
        type: boolean
        required: true
        default: true
  push:
    tags: ["v*"]

  pull_request:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  NDK_VERSION: "29.0.14206865"
  # Must match "builtin-baseline" in vcpkg.json.
  VCPKG_COMMIT: b322364f06308bdd24823f9d8f03fe0cc86fd46f

jobs:
  build:
    name: Build APK (arm64-v8a)
    runs-on: ubuntu-24.04
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Check out game files (private repo)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GAME_FILES_REPO }}
          token: ${{ secrets.GAME_FILES_TOKEN }}
          path: game-files

      - name: Stage game files
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        run: |
          install -m 644 game-files/default.xex game-files/default.xexp game-files/shader.ar UnleashedRecompLib/private/
          rm -rf game-files

      - name: Install build dependencies
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache clang

      - name: Set up JDK 17
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android NDK
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;$NDK_VERSION" >/dev/null

      - name: Set up vcpkg
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        run: |
          git clone https://github.com/microsoft/vcpkg thirdparty/vcpkg
          git -C thirdparty/vcpkg checkout "$VCPKG_COMMIT"
          thirdparty/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Cache vcpkg binary archives
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Set up ccache
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: android-arm64
          max-size: 3G

      # Code-generation tools must run on the build host, so they are built in a
      # separate native pass and handed to the cross build as prebuilt binaries
      # (mirrors build_host_tools.bat + build_android_configure.bat on Windows).
      - name: Extract zstd build
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        run: |
          cd tools/XenosRecomp/thirdparty/zstd
          unzip -o build.zip
          cd -

      - name: Build host tools
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        env:
          VCPKG_ROOT: ${{ github.workspace }}/thirdparty/vcpkg
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B out/build/host-tools -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUNLEASHED_RECOMP_HOST_TOOLS_ONLY=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build out/build/host-tools --target XenonRecomp XenosRecomp file_to_c x_decompress
          for tool in XenonRecomp XenosRecomp file_to_c x_decompress; do
            path=$(find out/build/host-tools -type f -name "$tool" | head -n 1)
            if [ -z "$path" ]; then
              echo "::error::Host tool $tool was not produced"
              exit 1
            fi
            var=$(echo "$tool" | tr '[:lower:]' '[:upper:]' | tr -d '_')
            echo "HOST_$var=$GITHUB_WORKSPACE/$path" >> "$GITHUB_ENV"
          done

      - name: Configure Android build
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        env:
          VCPKG_ROOT: ${{ github.workspace }}/thirdparty/vcpkg
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/$NDK_VERSION"
          export ANDROID_NDK_ROOT="$ANDROID_NDK_HOME"
          cmake -S . -B out/build/android-arm64 -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=thirdparty/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=arm64-android \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_SYSTEM_VERSION=29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DUNLEASHED_RECOMP_ANDROID=ON \
            -DUNLEASHED_RECOMP_D3D12=OFF \
            -DUNLEASHED_RECOMP_HOST_XENON_RECOMP="$HOST_XENONRECOMP" \
            -DUNLEASHED_RECOMP_HOST_XENOS_RECOMP="$HOST_XENOSRECOMP" \
            -DUNLEASHED_RECOMP_HOST_FILE_TO_C="$HOST_FILETOC" \
            -DUNLEASHED_RECOMP_HOST_X_DECOMPRESS="$HOST_XDECOMPRESS" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Fix dxc permissions
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        run: |
          chmod +x tools/XenosRecomp/thirdparty/dxc-bin/bin/x64/*

      - name: Build native libraries
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        run: |
          cmake --build out/build/android-arm64 \
            --target UnleashedRecomp main_hook file_redirect_hook gsl_alloc_hook hook_impl

      - name: Stage jniLibs
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        run: |
          dest=android-apk/app/src/main/jniLibs/arm64-v8a
          mkdir -p "$dest"
          cp out/build/android-arm64/UnleashedRecomp/libmain.so "$dest/"
          for lib in libmain_hook.so libfile_redirect_hook.so libgsl_alloc_hook.so libhook_impl.so; do
            path=$(find out/build/android-arm64 -name "$lib" | head -n 1)
            if [ -z "$path" ]; then
              echo "::error::adrenotools hook library $lib was not produced"
              exit 1
            fi
            cp "$path" "$dest/"
          done
          ls -la "$dest"

      - name: Apply custom Android changes
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        run: |
          python3 patches/patcher.py

      - name: Build APK
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        working-directory: android-apk
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
            export ANDROID_KEYSTORE_FILE="$RUNNER_TEMP/keystore.jks"
            ./gradlew --no-daemon assembleDebug
          else
            ./gradlew --no-daemon assembleDebug
          fi

      - name: Upload APK artifact
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.compile_apk != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-Android-${{ github.ref_name }}
          path: android-apk/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Get release tag
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'none')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_TAG=$(gh api repos/${{ github.repository }} --jq '.parent.full_name // empty' | \
            xargs -I{} gh api repos/{}/releases/latest --jq '.tag_name' 2>/dev/null || echo "manual")

          if [ -z "$BASE_TAG" ]; then
            echo "::error::Could not get original version"
            exit 1
          fi

          echo "RELEASE_TAG2=$BASE_TAG" >> "$GITHUB_ENV"

          TAG=$BASE_TAG

          N=2
          while gh release view "$TAG" >/dev/null 2>&1; do
            TAG="${BASE_TAG}-${N}"
            N=$((N + 1))
          done

          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

          echo "Using release tag: $BASE_TAG"

      - name: Select random banner
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'none')
        run: |
          BANNER=$(find patches/banners -type f \
            \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.webp" \) \
            | shuf -n 1)

          if [ -z "$BANNER" ]; then
            echo "::error::No banners found in extra/banners"
            exit 1
          fi

          echo "BANNER_PATH=$BANNER" >> "$GITHUB_ENV"
          echo "BANNER_NAME=$(basename "$BANNER")" >> "$GITHUB_ENV"

      # Renders the release title + notes as an image (used below the top banner
      # in the release body when USE_BANNER_IMAGE is true). Independent from
      # "Select random banner" above.
      - name: Draw release notes image
        if: |
          (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'none')) &&
          (github.event_name == 'push' || github.event.inputs.use_banner_image != 'false')
        run: |
          pip3 install pillow
          OUTPUT_PATHS=$(python3 patches/draw_banner.py \
            --image "patches/images/bg-releases.png" \
            --font "patches/FOT-Seurat Pro M.otf" \
            --title "                              ${{ env.RELEASE_TAG }}" \
            --notes "${{ github.event.inputs.release_notes }}" \
            --output "patches/images/bg-final.png")
          echo "NOTES_IMAGE_PATHS<<EOF" >> "$GITHUB_ENV"
          echo "$OUTPUT_PATHS" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
          echo "NOTES_IMAGE_PATH=$(echo "$OUTPUT_PATHS" | head -n1)" >> "$GITHUB_ENV"
          echo "NOTES_IMAGE_NAME=$(basename "$(echo "$OUTPUT_PATHS" | head -n1)")" >> "$GITHUB_ENV"

      - name: Create Release if needed
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'none')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_TAG2: ${{ env.RELEASE_TAG2 }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
          USE_BANNER_IMAGE: ${{ github.event_name == 'push' && 'true' || github.event.inputs.use_banner_image }}
          BANNER_PATH: ${{ env.BANNER_PATH }}
          BANNER_NAME: ${{ env.BANNER_NAME }}
          NOTES_IMAGE_PATHS: ${{ env.NOTES_IMAGE_PATHS }}
        run: |
          PARENT_REPO=$(gh api repos/${{ github.repository }} --jq '.parent.full_name // empty')
          REPOSITORY_URL="https://github.com/$PARENT_REPO"
          
          FLAGS=""

          if [ "$RELEASE_TYPE" = "prerelease" ]; then
            FLAGS="--prerelease"
          fi
          
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes "" \
            $FLAGS

          # Top banner: always shown, unrelated to the notes toggle.
          NOTES="<p align=\"center\">
            <img src=\"https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/${BANNER_PATH}\" alt=\"$BANNER_NAME\">
            </p>
            <p align="center">
            Release based on:
            <a href=\"$REPOSITORY_URL/releases/tag/$RELEASE_TAG2\">
              $PARENT_REPO@$RELEASE_TAG2
            </a>
            </p>"

          RELEASE_NOTES=$(printf "%b" "$RELEASE_NOTES")

          if [ "$USE_BANNER_IMAGE" = "true" ] && [ -n "$NOTES_IMAGE_PATHS" ]; then
            # uma <img> por pagina, na ordem em que foram geradas
            while IFS= read -r img; do
              [ -z "$img" ] && continue
              IMG_NAME=$(basename "$img")
              gh release upload "$RELEASE_TAG" "$img" --clobber
              NOTES="$NOTES
              <p align="center">
              <img src=\"https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${IMG_NAME}\" alt=\"$IMG_NAME\">
              </p>"
            done <<< "$NOTES_IMAGE_PATHS"
          elif [ -n "$RELEASE_NOTES" ]; then
            NOTES="$NOTES
            User notes:
            $RELEASE_NOTES"
          fi

          NOTES="$NOTES"

          gh release edit "$RELEASE_TAG" \
            --notes "$NOTES"

      - name: Upload APK to Release
        if: github.event.inputs.compile_apk != 'false' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'none'))
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          APK=$(find android-apk/app/build/outputs/apk -name '*.apk' | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::APK not found"
            exit 1
          fi

          NEW_NAME="UnleashedRecomp-${RELEASE_TAG}.apk"

          cp "$APK" "$NEW_NAME"

          gh release upload "$RELEASE_TAG" "$NEW_NAME" --clobber
